<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>



    <main class="c_escuro">



        <div class="display"></div>
        <div class="flex">
            <div>

                <div class="flex">
                    <div>
                        <div class="c_claro"><button>C</button></div>
                        <div class="c_claro"><button>7</button></div>
                        <div class="c_claro"><button>4</button></div>
                        <div class="c_claro"><button>1</button></div>
                    </div>

                    <div>
                        <div class="c_claro"><button>AC</button></div>
                        <div class="c_claro"><button>8</button></div>
                        <div class="c_claro"><button>5</button></div>
                        <div class="c_claro"><button>2</button></div>
                    </div>

                    <div>
                        <div class="c_claro"><button>/</button></div>
                        <div class="c_claro"><button>9</button></div>
                        <div class="c_claro"><button>6</button></div>
                        <div class="c_claro"><button>3</button></div>
                    </div>



                </div>

                <div class="flex">
                    <div class="c_claro"><button class="red">0</button></div>
                    <div class="c_claro"><button>.</button></div>
                </div>

            </div>


            <!-- Div lateral-->
            <div>
                <div class="c_claro"><button>*</button></div>
                <div class="c_claro"><button>-</button></div>
                <div class="c_claro"><button>+</button></div>
                <div class="c_claro"><button class="green">=</button></div>
            </div>


        </div>








    </main>

</body>

</html>
